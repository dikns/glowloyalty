[build]
  command   = "npm install && cd frontend && npm install && npm run build"
  publish   = "frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# API calls → Netlify Function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

# SPA fallback — React Router handles client-side routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
